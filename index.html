<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>THE FLOOR - Ultimate Tactics</title>
    <style>
        :root { 
            --bg: #eef2f3; --panel: #ffffff; --accent: #ff4757; 
            --green: #2ed573; --blue: #1e90ff; --text: #1a1a1a; 
            --sub: #a29bfe; --border: #1a1a1a; 
            --gold-grad: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            --invade-shine: linear-gradient(110deg, #f1c40f 40%, #fff 50%, #f1c40f 60%);
        }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; 
        }
        
        #setup { background: white; }
        h1.main-title { 
            font-size: 80px; font-weight: 900; letter-spacing: 20px; 
            margin: 0 0 30px 0; text-transform: uppercase; color: var(--text); line-height: 1;
        }

        .menu-btn { position: fixed; top: 25px; left: 25px; z-index: 1100; font-size: 28px; cursor: pointer; color: var(--text); opacity: 0.6; }
        #side-menu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--panel); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding-top: 80px; border-right: 1px solid rgba(0,0,0,0.05);
        }
        #side-menu.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.05); }
        .menu-item { padding: 18px 30px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.03); font-weight: 800; font-size: 14px; letter-spacing: 1px; }

        .page { display: none; height: 100vh; box-sizing: border-box; }
        .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* === ストラテジーマップ === */
        #map-page { padding: 40px 20px; justify-content: flex-start; overflow-y: auto; background: var(--bg); }
        .map-header { text-align: center; margin-bottom: 40px; }
        .map-title { font-size: 42px; font-weight: 900; letter-spacing: 12px; margin: 0; position: relative; display: inline-block; padding-bottom: 15px; }
        .map-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 4px; background: var(--text); }
        
        .header-controls { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        .random-btn { background: var(--gold-grad); color: #fff; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 15px rgba(243, 156, 18, 0.2); letter-spacing: 1px; }
        .undo-btn { background: #fff; color: var(--text); border: 2px solid var(--text); padding: 12px 30px; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .undo-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .grid-container { display: grid; gap: 0; margin: 0 auto 100px auto; padding: 25px; background: #fff; border-radius: 24px; box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff; }
        .floor-cell { background: #fff; box-sizing: border-box; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; width: 130px; height: 130px; font-weight: 900; text-align: center; font-size: 20px; color: #000; letter-spacing: 1px; position: relative; overflow: hidden; }
        
        /* 境界線デザイン */
        .edge-top { border-top: 2px solid #eee; }
        .edge-bottom { border-bottom: 2px solid #eee; }
        .edge-left { border-left: 2px solid #eee; }
        .edge-right { border-right: 2px solid #eee; }

        /* チーム選択時のハイライト */
        .group-selected { background: #fffdf0 !important; z-index: 5; }
        .group-selected.edge-top { border-top: 6px solid #f1c40f !important; }
        .group-selected.edge-bottom { border-bottom: 6px solid #f1c40f !important; }
        .group-selected.edge-left { border-left: 6px solid #f1c40f !important; }
        .group-selected.edge-right { border-right: 6px solid #f1c40f !important; }
        
        /* 侵略準備中のメインチーム（デザイン改良：流れるゴールド） */
        .is-invader { 
            background: var(--invade-shine) !important; 
            background-size: 200% 100% !important;
            animation: shine-flow 2s linear infinite !important;
            color: #000 !important; 
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5); 
            z-index: 10;
        }
        @keyframes shine-flow {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        .grid-container.focusing .floor-cell:not(.targetable):not(.is-invader) { opacity: 0.2; filter: grayscale(0.8); pointer-events: none; }
        
        /* 攻撃対象のアニメーション */
        .targetable { z-index: 10; animation: pulse-target 1s infinite alternate; }
        @keyframes pulse-target { 0% { transform: scale(1); background: #fff; } 100% { transform: scale(0.96); background: #ffebeb; } }
        .targetable.edge-top { border-top: 6px dashed var(--accent) !important; }
        .targetable.edge-bottom { border-bottom: 6px dashed var(--accent) !important; }
        .targetable.edge-left { border-left: 6px dashed var(--accent) !important; }
        .targetable.edge-right { border-right: 6px dashed var(--accent) !important; }
        
        #action-panel { position: fixed; bottom: 40px; right: 40px; display: flex; gap: 20px; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.4s; }
        #action-panel.visible { opacity: 1; pointer-events: auto; }
        #game.active ~ #action-panel { display: none !important; }

        .action-btn { padding: 18px 40px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; font-size: 16px; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.15); transition: 0.3s; }

        /* === 問題ページ === */
        .main-layout { display: flex; width: 96vw; height: 82vh; gap: 25px; align-items: stretch; justify-content: center; }
        .left-content { flex: 2; position: relative; background: #000; border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #current-image { max-width: 100%; max-height: 100%; object-fit: contain; }
        .counter-badge { position: absolute; top: 15px; right: 20px; background: rgba(255,255,255,0.9); padding: 5px 15px; border-radius: 20px; font-size: 18px; font-weight: 800; z-index: 5; }
        .right-content { flex: 0.9; display: flex; flex-direction: column; gap: 15px; }
        
        .timer-card { flex: 1; background: var(--panel); border-radius: 25px; border: 6px solid #ddd; text-align: center; position: relative; display: flex; flex-direction: column; justify-content: center; transition: 0.3s; }
        .timer-card.active { border-color: var(--accent); background: #fff8f8; transform: scale(1.02); }
        .countdown { font-size: 120px; font-weight: 900; font-family: 'Courier New', monospace; line-height: 1; }
        .label { color: #1a1a1a; font-size: 26px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 2px; }
        
        /* ダメージエフェクト */
        .damage-effect {
            position: absolute; top: 10px; right: 20px;
            color: var(--accent); font-size: 48px; font-weight: 900;
            pointer-events: none; animation: damage-anim 0.8s ease-out forwards;
            text-shadow: 2px 2px 0 #fff; z-index: 100;
        }
        @keyframes damage-anim {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        .controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; flex: 1.3; }
        .controls button { border: 0 !important; border-radius: 50px !important; font-size: 18px; font-weight: 900; cursor: pointer; color: white; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        #start-btn { background: var(--green) !important; }
        #stop-btn { background: #555 !important; }
        #reset-btn { background: #777 !important; }
        #pass-btn { background: var(--blue) !important; }
        .btn-switch { grid-column: span 2; font-size: 32px !important; letter-spacing: 2px; background: var(--accent) !important; }

        .winner-mark { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: #f1c40f; color: black; padding: 6px 25px; border-radius: 30px; font-weight: 900; font-size: 22px; display: none; animation: bounce 0.5s infinite alternate; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <nav id="side-menu">
        <div class="menu-item" onclick="showPage('setup')" style="color:var(--accent)">⚙ RESET / UPLOAD</div>
        <div class="menu-item" onclick="showPage('map-page')" style="color:var(--blue)">🗺 STRATEGY MAP</div>
        <div id="genre-list" style="margin-top: 20px;"></div>
    </nav>

    <div id="setup" class="page active">
        <h1 class="main-title">THE FLOOR</h1>
        <p style="font-weight: 800; color: #666;">画像をフォルダごとドラッグ＆ドロップ、または選択</p>
        <input type="file" id="file-input" multiple accept="image/*" style="padding:60px; border:6px dashed #eee; border-radius:30px; color:#999; font-weight:900; cursor:pointer;">
    </div>

    <div id="map-page" class="page">
        <div class="map-header">
            <h1 class="map-title">STRATEGY HUB</h1>
            <div class="header-controls">
                <button class="undo-btn" id="undo-btn" onclick="undoCapture()" disabled>↩ UNDO</button>
                <button class="random-btn" onclick="selectRandomTeam()">🎲 RANDOM SELECT</button>
            </div>
        </div>
        <div id="grid-container" class="grid-container"></div>
    </div>

    <div id="game" class="page">
        <h2 id="current-genre-title" style="letter-spacing:15px; font-weight:900; font-size: 32px;">GENRE</h2>
        <div class="main-layout">
            <div class="left-content"><div id="counter" class="counter-badge"></div><img id="current-image" src=""></div>
            <div class="right-content">
                <div id="box0" class="timer-card"><div id="winner0" class="winner-mark">🏆 WINNER</div><div class="label">Challenger</div><div id="time0" class="countdown">45.0</div></div>
                <div id="box1" class="timer-card"><div id="winner1" class="winner-mark">🏆 WINNER</div><div class="label">Defender</div><div id="time1" class="countdown">45.0</div></div>
                <div class="controls">
                    <button id="start-btn" onclick="handleStart()">START (S)</button>
                    <button id="stop-btn" onclick="stopTimer()">PAUSE</button>
                    <button id="reset-btn" onclick="resetAll()">RESET</button>
                    <button id="pass-btn" onclick="pass()">PASS (P)</button>
                    <button class="btn-switch" onclick="switchAndNext()">正解！ (SPACE)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="action-panel">
        <button id="mode-btn" class="action-btn" style="background:var(--text)" onclick="startInvasion()">PREPARE INVASION</button>
        <button class="action-btn" style="background:var(--blue)" onclick="goToQuiz()">START QUIZ</button>
    </div>

<script>
    let genreData = {}; let territory = []; let cols = 0;
    let history = []; 
    let currentGenre = ""; let currentIndex = 0; let timeLeft = [45.0, 45.0]; 
    let activePlayer = 0; let isRunning = false; let isGameOver = false; let timerInterval = null;
    let selectedOwner = null; let isFocus = false; let invaderName = null;
    let isResume = false;

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
    
    function showPage(pageId) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId === 'map-page') { cancelInvasion(); renderMap(); } 
        else { document.getElementById('action-panel').classList.remove('visible'); }
    }

    // 拡張子対応を強化
    document.getElementById('file-input').addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        genreData = {};
        
        // 画像ファイルのみを対象に、拡張子を無視して処理
        const imageFiles = files.filter(f => f.type.startsWith('image/'));
        
        imageFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
        
        imageFiles.forEach(file => {
            const g = file.name.split('_')[0] || "未分類";
            if (!genreData[g]) genreData[g] = [];
            genreData[g].push(URL.createObjectURL(file));
        });

        // ジャンルリストを作成
        const genres = Object.keys(genreData);
        if (genres.length === 0) return;

        territory = genres.map(g => ({ name: g, owner: g }));
        
        // タイルの配置（できるだけ正方形に近づける）
        cols = Math.ceil(Math.sqrt(territory.length));
        
        history = []; updateUndoButton();
        updateMenu(); showPage('map-page');
    });

    function selectRandomTeam() {
        const uniqueOwners = Array.from(new Set(territory.map(t => t.owner)));
        if (uniqueOwners.length === 0) return;
        selectedOwner = uniqueOwners[Math.floor(Math.random() * uniqueOwners.length)];
        cancelInvasion();
    }

    function renderMap() {
        const container = document.getElementById('grid-container');
        if(!container || territory.length === 0) return;
        container.style.gridTemplateColumns = `repeat(${cols}, 130px)`;
        container.innerHTML = "";
        if(isFocus) container.classList.add('focusing'); else container.classList.remove('focusing');

        const ownerGroups = {};
        territory.forEach((t, i) => {
            if (!ownerGroups[t.owner]) ownerGroups[t.owner] = [];
            ownerGroups[t.owner].push({ idx: i, r: Math.floor(i / cols), c: i % cols });
        });

        const labelPositions = {};
        Object.keys(ownerGroups).forEach(owner => {
            const cells = ownerGroups[owner];
            const avgR = cells.reduce((sum, c) => sum + c.r, 0) / cells.length;
            const avgC = cells.reduce((sum, c) => sum + c.c, 0) / cells.length;
            let closestCell = cells[0]; let minDist = Infinity;
            cells.forEach(cell => {
                const dist = Math.pow(cell.r - avgR, 2) + Math.pow(cell.c - avgC, 2);
                if (dist < minDist) { minDist = dist; closestCell = cell; }
            });
            labelPositions[closestCell.idx] = owner;
        });

        const targetableOwners = isFocus ? getTargetableTeamNames(invaderName) : [];

        territory.forEach((t, i) => {
            const cell = document.createElement('div');
            const owner = t.owner;
            cell.className = 'floor-cell';
            if (labelPositions[i]) cell.innerText = owner;
            const r = Math.floor(i / cols), c = i % cols;
            
            // 境界判定
            if (r === 0 || territory[i - cols].owner !== owner) cell.classList.add('edge-top');
            if (r === Math.floor((territory.length - 1) / cols) || (territory[i + cols] && territory[i + cols].owner !== owner)) cell.classList.add('edge-bottom');
            if (c === 0 || (i % cols !== 0 && territory[i - 1].owner !== owner)) cell.classList.add('edge-left');
            if (c === cols - 1 || (i % cols !== cols - 1 && territory[i + 1] && territory[i + 1].owner !== owner)) cell.classList.add('edge-right');
            
            if(selectedOwner === owner) cell.classList.add('group-selected');
            if(isFocus && owner === invaderName) cell.classList.add('is-invader');
            
            if(isFocus && targetableOwners.includes(owner)) {
                cell.classList.add('targetable');
                cell.onclick = (e) => { e.stopPropagation(); executeCapture(owner); };
            } else {
                cell.onclick = () => { selectedOwner = owner; isFocus = false; updatePanel(); renderMap(); };
            }
            container.appendChild(cell);
        });
    }

    function getTargetableTeamNames(invName) {
        const targets = new Set();
        territory.forEach((t, i) => {
            if (t.owner !== invName) return;
            const r = Math.floor(i / cols), c = i % cols;
            const neighbors = [];
            if (r > 0) neighbors.push(i - cols);
            if (r < Math.floor((territory.length - 1) / cols)) neighbors.push(i + cols);
            if (c > 0) neighbors.push(i - 1);
            if (c < cols - 1) neighbors.push(i + 1);

            neighbors.forEach(nIdx => { 
                if (territory[nIdx] && territory[nIdx].owner !== invName) targets.add(territory[nIdx].owner); 
            });
        });
        return Array.from(targets);
    }

    function updatePanel() { 
        const panel = document.getElementById('action-panel');
        const isMapActive = document.getElementById('map-page').classList.contains('active');
        panel.classList.toggle('visible', isMapActive && selectedOwner !== null); 
        const modeBtn = document.getElementById('mode-btn');
        if(isFocus) {
            modeBtn.innerText = "CANCEL";
            modeBtn.style.background = "#555";
            modeBtn.onclick = cancelInvasion;
        } else {
            modeBtn.innerText = "PREPARE INVASION";
            modeBtn.style.background = "var(--text)";
            modeBtn.onclick = startInvasion;
        }
    }

    function startInvasion() { isFocus = true; invaderName = selectedOwner; updatePanel(); renderMap(); }
    function cancelInvasion() { isFocus = false; invaderName = null; updatePanel(); renderMap(); }

    function executeCapture(victimName) {
        history.push(JSON.parse(JSON.stringify(territory)));
        updateUndoButton();
        territory.forEach(t => { if(t.owner === victimName) t.owner = invaderName; });
        cancelInvasion(); 
    }

    function undoCapture() {
        if (history.length === 0) return;
        territory = history.pop();
        updateUndoButton();
        renderMap();
    }

    function updateUndoButton() {
        const btn = document.getElementById('undo-btn');
        if(btn) btn.disabled = (history.length === 0);
    }

    function goToQuiz() { 
        // 選択されているジャンルの元の名前を取得
        const genreName = territory.find(t => t.owner === selectedOwner)?.name;
        if(genreName) loadGenre(genreName); 
    }

    function updateMenu() {
        const list = document.getElementById('genre-list'); if(!list) return;
        list.innerHTML = "";
        Object.keys(genreData).forEach(g => {
            const div = document.createElement('div'); div.className = "menu-item"; div.innerText = "▶ " + g;
            div.onclick = () => loadGenre(g); list.appendChild(div);
        });
    }

    function loadGenre(g) { 
        currentGenre = g; isResume = false; resetAll(); 
        document.getElementById('current-genre-title').innerText = g; 
        showPage('game'); showImage(); 
    }

    function showImage() {
        if (!currentGenre) return;
        const img = document.getElementById('current-image');
        img.src = genreData[currentGenre][currentIndex];
        document.getElementById('counter').innerText = (currentIndex + 1) + " / " + genreData[currentGenre].length;
        if (currentIndex === genreData[currentGenre].length - 1) { isGameOver = true; stopTimer(); determineWinner(); }
    }

    function handleStart() { if (isRunning) stopTimer(); else startTimer(); }

    function startTimer() { 
        if (isRunning || isGameOver || !currentGenre) return;
        if (!isResume && currentIndex < genreData[currentGenre].length - 1) { currentIndex++; showImage(); }
        isRunning = true; isResume = false; updateButtonLabels();
        timerInterval = setInterval(() => { 
            timeLeft[activePlayer] -= 0.1; 
            if (timeLeft[activePlayer] <= 0) { timeLeft[activePlayer] = 0.0; stopTimer(); isGameOver = true; determineWinner(); } 
            updateDisplay(); 
        }, 100); 
    }

    function stopTimer() { isRunning = false; isResume = true; clearInterval(timerInterval); updateButtonLabels(); }
    function updateButtonLabels() { document.getElementById('start-btn').innerText = isRunning ? "PAUSE" : "START (S)"; }

    function switchAndNext() { 
        if (!isRunning || isGameOver) return; 
        activePlayer = (activePlayer === 0) ? 1 : 0; 
        if (currentIndex < genreData[currentGenre].length - 1) { currentIndex++; showImage(); } 
        updateDisplay(); 
    }

    function pass() { 
        if (!isRunning || isGameOver) return; 
        showDamageEffect(activePlayer);
        timeLeft[activePlayer] = Math.max(0, timeLeft[activePlayer] - 5.0); 
        if (currentIndex < genreData[currentGenre].length - 1) { currentIndex++; showImage(); } 
        updateDisplay(); 
    }

    function showDamageEffect(playerId) {
        const box = document.getElementById('box' + playerId);
        const effect = document.createElement('div');
        effect.className = 'damage-effect';
        effect.innerText = '-5.0';
        box.appendChild(effect);
        setTimeout(() => { effect.remove(); }, 800);
    }

    function determineWinner() {
        if (timeLeft[0] > timeLeft[1]) { document.getElementById('winner0').style.display = 'block'; document.getElementById('box0').style.backgroundColor = "#fff9db"; }
        else if (timeLeft[1] > timeLeft[0]) { document.getElementById('winner1').style.display = 'block'; document.getElementById('box1').style.backgroundColor = "#fff9db"; }
    }

    function updateDisplay() {
        document.getElementById('time0').innerText = timeLeft[0].toFixed(1); 
        document.getElementById('time1').innerText = timeLeft[1].toFixed(1);
        document.getElementById('box0').classList.toggle('active', !isGameOver && activePlayer === 0);
        document.getElementById('box1').classList.toggle('active', !isGameOver && activePlayer === 1);
    }

    function resetAll() { 
        stopTimer(); isGameOver = false; isResume = false;
        timeLeft = [45.0, 45.0]; activePlayer = 0; currentIndex = 0; 
        document.querySelectorAll('.winner-mark').forEach(m => m.style.display = 'none'); 
        document.querySelectorAll('.timer-card').forEach(b => { b.style.backgroundColor = "var(--panel)"; b.classList.remove('active'); }); 
        if (currentGenre) showImage(); updateDisplay(); updateButtonLabels();
    }

    window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        const key = e.key.toUpperCase();
        if (e.code === 'Space') { e.preventDefault(); switchAndNext(); } 
        else if (key === 'S') { handleStart(); } 
        else if (key === 'P') { pass(); }
    });
</script>
</body>
</html>
